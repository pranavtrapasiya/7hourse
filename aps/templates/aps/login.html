{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d0f14">
  <title>Login — WMS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-card">
      <div class="login-brand">
        <div class="login-icon"><i class="bi bi-box-seam-fill"></i></div>
        <h1 class="login-title">WMS</h1>
        <p class="login-sub">Warehouse Management System</p>
      </div>

      {% if form.errors %}
      <div class="alert alert-danger d-flex align-items-center gap-2" role="alert">
        <i class="bi bi-exclamation-triangle-fill"></i>
        <span>Invalid username or password. Please try again.</span>
      </div>
      {% endif %}

      <form method="post" novalidate>
        {% csrf_token %}
        <div class="mb-4">
          <label for="id_username" class="form-label fw-500">Username</label>
          <div class="input-group input-group-lg">
            <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
            <input type="text" name="username" id="id_username"
                   class="form-control form-control-lg"
                   placeholder="Enter username"
                   autocomplete="username"
                   autofocus required>
          </div>
        </div>
        <div class="mb-4">
          <label for="id_password" class="form-label fw-500">Password</label>
          <div class="input-group input-group-lg">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input type="password" name="password" id="id_password"
                   class="form-control form-control-lg"
                   placeholder="Enter password"
                   autocomplete="current-password" required>
            <button class="btn btn-outline-secondary" type="button" id="togglePassword" tabindex="-1">
              <i class="bi bi-eye-fill"></i>
            </button>
          </div>
        </div>
        <input type="hidden" name="next" value="{{ next }}">
        <button type="submit" class="btn btn-primary btn-lg w-100 mt-2">
          <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
        </button>
      </form>

      <p class="login-footer-note">Access restricted to authorized staff only.</p>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById('togglePassword').addEventListener('click', function() {
      const inp = document.getElementById('id_password');
      const icon = this.querySelector('i');
      if (inp.type === 'password') {
        inp.type = 'text';
        icon.className = 'bi bi-eye-slash-fill';
      } else {
        inp.type = 'password';
        icon.className = 'bi bi-eye-fill';
      }
    });
  </script>
</body>
</html>
