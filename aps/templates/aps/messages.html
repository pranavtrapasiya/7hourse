{% if messages %}
<div class="messages-container">
  {% for message in messages %}
  <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show d-flex align-items-center gap-2" role="alert">
    {% if message.tags == 'success' %}<i class="bi bi-check-circle-fill flex-shrink-0"></i>
    {% elif message.tags == 'error' or message.tags == 'danger' %}<i class="bi bi-exclamation-triangle-fill flex-shrink-0"></i>
    {% elif message.tags == 'warning' %}<i class="bi bi-exclamation-circle-fill flex-shrink-0"></i>
    {% else %}<i class="bi bi-info-circle-fill flex-shrink-0"></i>{% endif %}
    <span>{{ message }}</span>
    <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert" aria-label="Close"></button>
  </div>
  {% endfor %}
</div>
{% endif %}
