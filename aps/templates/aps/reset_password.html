{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d0f14">
  <title>New Password — Product Pilot Go</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-card">
      <div class="login-brand">
        <div class="login-icon"><i class="bi bi-key-fill"></i></div>
        <h1 class="login-title">New Password</h1>
        <p class="login-sub">Enter a new secure password for your account.</p>
      </div>

      {% if messages %}
      <div class="messages-container mb-3">
        {% for message in messages %}
        <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} d-flex align-items-center gap-2" role="alert">
          <i class="bi bi-{% if message.tags == 'success' %}check-circle-fill{% elif message.tags == 'info' %}info-circle-fill{% else %}exclamation-triangle-fill{% endif %}"></i>
          <span>{{ message.message }}</span>
        </div>
        {% endfor %}
      </div>
      {% endif %}

      <form method="post" novalidate>
        {% csrf_token %}
        <div class="mb-3">
          <label for="id_password" class="form-label fw-500">New Password</label>
          <div class="input-group input-group-lg">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input type="password" name="password" id="id_password"
                   class="form-control form-control-lg"
                   placeholder="New Password"
                   required autofocus>
          </div>
        </div>
        <div class="mb-4">
          <label for="id_confirm_password" class="form-label fw-500">Confirm Password</label>
          <div class="input-group input-group-lg">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input type="password" name="confirm_password" id="id_confirm_password"
                   class="form-control form-control-lg"
                   placeholder="Confirm Password"
                   required>
          </div>
        </div>
        
        <button type="submit" class="btn btn-primary btn-lg w-100 mt-2">
          <i class="bi bi-floppy-fill me-2"></i>Save Password
        </button>
      </form>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
