services:
  - type: web
    name: wms-app
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn app.wsgi:application"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: app.settings
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: wms-db
          property: connectionString

databases:
  - name: wms-db
    plan: free
